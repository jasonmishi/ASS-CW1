version: '3.9'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alum
    ports:
      - "5432:5432"
    volumes:
      - alum_db_data:/var/lib/postgresql/data

  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/alum
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@eastminster.local
      APP_BASE_URL: http://localhost:3000
    depends_on:
      - db
      - mailhog

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  alum_db_data:
