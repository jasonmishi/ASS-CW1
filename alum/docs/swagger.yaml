    get:
      tags: [API Client Management]
      summary: List all API clients
      description: Returns a list of all registered API clients and their basic information. Admin only.
      operationId: listApiClients
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: API clients listed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        client_id:
                          type: string
                          example: cli_a1b2c3d4e5f6
                        client_name:
                          type: string
                          example: AR Campus App
                        description:
                          type: string
                        contact_email:
                          type: string
                          format: email
                        created_by_user_id:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        is_revoked:
                          type: boolean
                          example: false
                        # Backward compatibility aliases
                        clientId:
                          type: string
                          deprecated: true
                        clientName:
                          type: string
                          deprecated: true
                        contactEmail:
                          type: string
                          deprecated: true
                        isRevoked:
                          type: boolean
                          deprecated: true
                        createdAt:
                          type: string
                          format: date-time
                          deprecated: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /clients/{clientId}/usage:
    get:
      tags: [API Client Management]
      summary: Get API client usage
      description: |
        Returns detailed usage statistics for a specific API client, including:
        - API client metadata
        - Token history (`api_client_tokens`)
        - Endpoint usage rows (`api_client_endpoint_usage`)
        - Aggregate totals
      operationId: getClientUsageStats
      security:
        - SessionCookieAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start date for usage stats (YYYY-MM-DD).
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: End date for usage stats (YYYY-MM-DD).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Usage statistics retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApiClientUsageStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /clients/{clientId}/tokens:
    post:
      tags: [API Client Management]
      summary: Create an additional API client token
      description: |
        Creates a new token for the specified API client without revoking existing tokens.
        This supports multiple active tokens per client.
      operationId: createClientToken
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scopes:
                  type: array
                  description: Optional token scopes. Defaults to all public read scopes.
                  items:
                    $ref: '#/components/schemas/ApiClientScope'
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional token expiry datetime. Must be in the future.
                  example: "2026-03-05T12:00:00.000Z"
      responses:
        '201':
          description: Additional token created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Client token created successfully. Store it securely; it will not be shown again.
                  data:
                    type: object
                    properties:
                      client_id:
                        type: string
                      token:
                        type: string
                      token_id:
                        type: string
                      scopes:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiClientScope'
                      issued_at:
                        type: string
                        format: date-time
                      expires_at:
                        type: string
                        format: date-time
                        nullable: true
                      revoked_at:
                        type: string
                        format: date-time
                        nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [API Client Management]
      summary: List API client tokens
      description: Returns all tokens (active and revoked) for a specific API client.
      operationId: listClientTokens
      security:
        - SessionCookieAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client tokens listed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        token_id:
                          type: string
                        client_id:
                          type: string
                        scopes:
                          type: array
                          items:
                            $ref: '#/components/schemas/ApiClientScope'
                        issued_at:
                          type: string
                          format: date-time
                        expires_at:
                          type: string
                          format: date-time
                          nullable: true
                        revoked_at:
                          type: string
                          format: date-time
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /clients/{clientId}/tokens/{tokenId}:
    delete:
      tags: [API Client Management]
      summary: Revoke a specific API client token
      description: Revokes only the specified token for the given API client.
      operationId: revokeClientTokenByTokenId
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Token revoked successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────
  # ADMIN – EVENT ATTENDANCE
  # ──────────────────────────────────────────
  /admin/event-attendances:
    post:
      tags: [Admin]
      summary: Record alumni event attendance
      description: |
        Records that an alumnus attended a university alumni event, granting them
        eligibility for a **4th "Alumni of the Day" win** that calendar month.
        Admin only.
      operationId: recordEventAttendance
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventAttendanceRequest'
      responses:
        '201':
          description: Event attendance recorded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Event attendance recorded. Alumni now has 4 available slots this month.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/winners:
    post:
      tags: [Admin]
      summary: Create a daily winner
      description: |
        Manually creates a winner resource for the specified date (normally automated at midnight daily).
        Selects the highest bidder as the "Alumni of the Day" for the specified date,
        marks their profile for display, and sends email notifications to the winner
        and all other bidders.

        This is an **admin-only fallback** in case the automated job fails.
      operationId: createWinner
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date]
              properties:
                date:
                  type: string
                  format: date
                  description: The date for which to select the winner (YYYY-MM-DD).
                  example: "2026-02-20"
      responses:
        '201':
          description: Winner created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Winner created for 2026-02-20.
                  data:
                    $ref: '#/components/schemas/WinnerResult'
        '400':
          description: Winner already exists for this date, or no bids exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Admin]
      summary: List all past winners
      description: Returns all past "Alumni of the Day" winners with their winning bid amounts. Admin only.
      operationId: listWinners
      security:
        - SessionCookieAuth: []
      parameters:
        - name: month
          in: query
          description: Filter by month (YYYY-MM).
          schema:
            type: string
      responses:
        '200':
          description: Winners list retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WinnerResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/users:
    get:
      tags: [Admin]
      summary: List current users
      description: Returns all current users with their roles. Admin only.
      operationId: listAdminUsers
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Users listed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Admin]
      summary: Create a new Developer or Sponsor account
      description: |
        Allows Admins to create new accounts with specific roles (Developer, Sponsor, or Admin).
        Default role is 'Alumni' if not specified, but this endpoint is intended for privileged account creation.
        Use this to onboard Admin users when needed.
        A verification email is sent to the created user, and the account remains unverified until the email link is used.
      operationId: createPrivilegedUser
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{userId}/role:
    put:
      tags: [Admin]
      summary: Promote a user's role
      description: |
        Allows Admins to set an existing user's role to 'Developer', 'Sponsor', or 'Admin'.
        Assigning the Admin role is restricted to Admins only.
        The last remaining Admin cannot be demoted.
      operationId: updateUserRole
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: userId
          in: path
          schema:
            type: string
          required: true
          description: The ID of the user to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: User role updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User role updated to Developer.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
