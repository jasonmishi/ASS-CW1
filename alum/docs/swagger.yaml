          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Bidding]
      summary: Update (increase) an existing bid
      description: |
        Updates an existing bid. The new amount **must be higher** than the previous bid amount.
        Bids cannot be decreased or withdrawn. Only bids for the current bidding window (today's selection) can be updated.
      operationId: updateBid
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: bidId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '200':
          description: Bid updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          description: New amount must be higher than current bid, or bidding window has closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: New bid amount must be greater than your current bid of £250.00.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bids/summary:
    get:
      tags: [Bidding]
      summary: Get bid summary for a month
      description: |
        Returns the alumni's bidding summary for the specified month, including:
        - Number of wins this month
        - Maximum wins allowed (3 or 4)
        - Remaining available slots
        - Whether the alumni attended a university event this month
        - All bids placed during the month
      operationId: getMonthlyBidSummary
