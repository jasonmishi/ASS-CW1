  /sponsorships/offers:
    post:
      tags: [Sponsorship]
      summary: Create a sponsorship offer for an alumni
      description: |
        A sponsor (course provider, licensing body, or certification organisation) creates
        a sponsorship offer for a specific credential on an alumni's profile.

        **How it works:**
        - The sponsor selects one alumni credential (certification, licence, or course).
        - The sponsor offers an amount (£) to the alumni to endorse/promote that credential.
        - The alumni can accept or decline the offer.
        - If accepted, the funds become available in the alumni's bidding pool.
        - The sponsor is **only charged** if the alumni wins "Alumni of the Day" and their profile is displayed.

        This endpoint is accessible to authenticated sponsors/admins.
      operationId: createSponsorshipOffer
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsorshipOfferRequest'
      responses:
        '201':
          description: Sponsorship offer created and sent to alumni.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sponsorship offer sent to the alumni.
                  data:
                    $ref: '#/components/schemas/SponsorshipOffer'
        '400':
          description: |
            Validation error. Possible reasons:
            - Invalid credential type or ID.
            - Credential does not exist on the alumni's profile.
            - Amount must be at least £1.00.
            - Duplicate active offer for the same credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Alumni or credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Sponsorship]
      summary: List my sent sponsorship offers
      description: Returns sponsorship offers created by the authenticated sponsor's organization. Filterable by status, alumni, or sponsor.
      operationId: listAllSponsorshipOffers
      security:
        - SessionCookieAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by offer status.
          schema:
            type: string
            enum: [pending, accepted, declined, expired, paid, cancelled]
        - name: alumniId
          in: query
          description: Filter by alumni ID.
          schema:
            type: string
        - name: sponsorName
          in: query
          description: Filter by sponsor name (partial match).
          schema:
            type: string
      responses:
        '200':
          description: Sponsorship offers retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SponsorshipOffer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sponsorships/offers/{offerId}:
    get:
      tags: [Sponsorship]
      summary: Get a specific sponsorship offer
      description: Returns full details of a specific sponsorship offer.
      operationId: getSponsorshipOffer
      security:
        - SessionCookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
