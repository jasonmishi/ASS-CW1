      description: |
        Returns a summary of the authenticated alumni's sponsorship situation:
        - Total funds from accepted sponsorships
        - Amount already committed in active bids
        - Remaining balance available for new bids
        - Breakdown of each accepted sponsorship offer

        **Example:** Alumni has 4 certifications. 2 sponsors offer £200 and £300 respectively.
        Alumni accepts both → total pool is £500. Alumni bids £250 → available balance is £250.
        If they win, they pocket £250 and accepted sponsors are charged their full accepted amounts (£200 and £300).
      operationId: getMySponsorshipBalance
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Sponsorship balance summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/SponsorshipSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

