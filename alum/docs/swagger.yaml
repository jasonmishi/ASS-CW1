openapi: 3.0.3
info:
  title: Phantasmagoria Alumni Engagement Platform API
  description: |
    # How It Works
    1. **Alumni as Influencers**: Successful alumni leverage their professional credentials on the platform.
    2. **Sponsorship Model**: Course providers, licensing bodies, and certification organisations sponsor alumni to promote their offerings. Sponsors offer money to alumni for endorsing their credentials. Sponsors are **only charged if the alumni wins** and their profile is displayed. Alumni pocket their winning bid amount.
    3. **Daily Blind Bidding**: Alumni use **sponsorship funds** to bid for exclusive 24-hour featured slots ("Alumni of the Day"). The bid amount cannot exceed the alumni's available sponsorship balance. Alumni keep the difference between bid amount and sponsorship as profit.
    4. **Student Benefits**: Students discover relatable success stories, career paths, and LinkedIn connections.

    ## Authentication
    - **Alumni Users**: Cookie-based session authentication after email verification.
    - **API Clients**: Bearer API key authentication for programmatic access to public endpoints.

    Alumni flow:
    1. `POST /auth/sessions` to log in.
    2. Server sets `access_token` (HttpOnly) and `csrf_token` cookies.
    3. For authenticated write operations (`POST`, `PUT`, `PATCH`, `DELETE`), send the `csrf_token` cookie and an `X-CSRF-Token` header with the same value.
    4. Public API endpoints still use `Authorization: Bearer <api_client_token>`.

    ## Bidding Rules
    - **Blind Bidding**: Alumni cannot see the current highest bid; they only receive win/lose feedback.
    - **Increase Only**: Bids can only be updated upward.
    - **Monthly Limit**: Each alumnus can win "Alumni of the Day" a maximum of **3 times per calendar month**. Attending a university alumni event grants eligibility for a **4th win** that month.
    - **Winner Selection**: Automated daily at **midnight**; the highest bidder's profile is featured for the entire following day.

    ## Rate Limiting
    - Global API limit for `/api/v1/*`: **100 requests per 15 minutes** per caller key.
    - Caller key priority: API client token (public endpoints), then authenticated session cookie, then IP.
    - `/api-docs` and `/api-docs.json` are excluded from rate limiting.

  version: 1.0.0
  contact:
    name: Jason Carvalho
    email: jasonmishi@gmail.com
    url: https://jasonmishi.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.eastminster-alumni.ac.uk/api/v1
    description: Production server

tags:
  - name: Authentication
    description: Alumni registration, login, logout, email verification, and password reset
  - name: Profile
    description: Complete alumni profile management (personal info, degrees, certifications, licences, courses, employment, image)
  - name: Sponsorship
    description: Sponsorship offers from course providers, licensing bodies, and certification organisations to alumni
  - name: Bidding
    description: Blind bidding system for "Alumni of the Day" featured slots
  - name: Public API
    description: Public developer endpoints (requires bearer token) – client-agnostic data access
  - name: API Client Management
    description: API client registration, token management, usage statistics, and revocation
  - name: Admin
    description: Administrative operations (event attendance, winner override)

# ──────────────────────────────────────────────
# Security Schemes
# ──────────────────────────────────────────────
components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        Alumni authenticated session cookie.
        Issued by `POST /auth/sessions` as `Set-Cookie: access_token=...`.
        Used for non-public alumni/admin/sponsor endpoints.
    CsrfCookie:
      type: apiKey
      in: cookie
      name: csrf_token
      description: |
        CSRF cookie required for mutating operations.
        Its value must match the `X-CSRF-Token` header.
        Safe routes do not require this cookie and usually issue it automatically if missing.
        `GET /auth/csrf-token` can be used to fetch it explicitly.
    CsrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        CSRF header required for mutating operations.
        Must match the `csrf_token` cookie value.
        `POST /auth/sessions` is exempt from CSRF validation.
    APIKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        API client token for accessing public endpoints.
        Include in the `Authorization` header as `Bearer <token>`.
        API client tokens are scoped to viewing public data.
    

  # ──────────────────────────────────────────
  # Reusable Schemas
  # ──────────────────────────────────────────
  schemas:
    # ─── Schemas ──────────────────────────
    UserRole:
      type: string
      enum: [Alumni, Admin, Developer, Sponsor]
      default: Alumni
      description: |
        - **Alumni**: Default role for new registrations.
        - **Admin**: System administrator with full access. Only Admins can grant or revoke Admin role.
        - **Developer**: Technical role, can be promoted by Admin.
        - **Sponsor**: External organization account, can be promoted by Admin.

    User:
      type: object
      properties:
        id:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        email:
          type: string
          example: jane.doe@eastminster.ac.uk
        role:
          $ref: '#/components/schemas/UserRole'
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe
        emailVerified:
          type: boolean
          example: true

    # ─── Error ────────────────────────────
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An error occurred.
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # ─── Registration ─────────────────────
    RegisterRequest:
      type: object
      required: [email, password, confirmPassword, firstName]
      properties:
        email:
          type: string
          format: email
          description: Must be a valid University of Eastminster domain email (e.g. @eastminster.ac.uk).
          example: jane.doe@eastminster.ac.uk
        password:
          type: string
          format: password
          minLength: 8
          description: |
            Must contain at least 8 characters, one uppercase letter, one lowercase letter,
            one digit, and one special character.
          example: S3cure!Pass
        confirmPassword:
          type: string
          format: password
          example: S3cure!Pass
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Registration successful. Please check your email to verify your account.
        data:
          $ref: '#/components/schemas/User'

    # ─── Email Verification ──────────────
    RequestEmailVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Alumni email address to send a fresh verification link.
          example: jane.doe@eastminster.ac.uk

    # ─── Login ────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: jane.doe@eastminster.ac.uk
        password:
          type: string
          format: password
          example: S3cure!Pass

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful.
        data:
          type: object
          properties:
            token:
              type: string
              description: Signed JWT value stored in the `access_token` cookie. Returned for compatibility but cookie auth is authoritative.
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NjVhMWIyYzNkNGU1ZjZhN2I4YzlkMGUiLCJpYXQiOjE3MDk4MzA0MDAsImV4cCI6MTcwOTgzNDAwMH0.abc123
            expiresIn:
              type: integer
              description: Token expiry time in seconds.
              example: 3600
            userId:
              type: string
              example: 665a1b2c3d4e5f6a7b8c9d0e
            email:
              type: string
              example: jane.doe@eastminster.ac.uk
            firstName:
              type: string
              example: Jane
            lastName:
              type: string
              example: Doe

    SessionSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            activeSessionsCount:
              type: integer
              example: 2
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
              example: 2026-03-02T18:00:00.000Z

    # ─── Password Reset ──────────────────
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: jane.doe@eastminster.ac.uk

    ResetPasswordRequest:
      type: object
      required: [token, newPassword, confirmNewPassword]
      properties:
        token:
          type: string
          description: Secure password reset token sent via email. Single-use with expiry.
          example: f1e2d3c4b5a69788796a5b4c3d2e1f00
        newPassword:
          type: string
          format: password
          minLength: 8
          example: N3wS3cure!Pass
        confirmNewPassword:
          type: string
          format: password
          example: N3wS3cure!Pass

    # ─── Profile ──────────────────────────
    Profile:
      type: object
      properties:
        userId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe
        biography:
          type: string
          example: Software engineer with 10 years of experience in EdTech.
        linkedinUrl:
          type: string
          format: uri
          example: https://www.linkedin.com/in/janedoe
        profileImageUrl:
          type: string
          format: uri
          example: /uploads/profiles/665a1b2c3d4e5f6a7b8c9d0e.jpg
        degrees:
          type: array
          items:
            $ref: '#/components/schemas/Degree'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        licences:
          type: array
          items:
            $ref: '#/components/schemas/Licence'
        courses:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        employmentHistory:
          type: array
          items:
            $ref: '#/components/schemas/Employment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProfileUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe
        biography:
          type: string
          example: Software engineer with 10 years of experience in EdTech.
        linkedinUrl:
          type: string
          format: uri
          example: https://www.linkedin.com/in/janedoe

    Degree:
      type: object
      required: [title, university, degreeUrl, completionDate]
      properties:
        degreeId:
          type: string
          example: d1a2b3c4d5e6f7a8b9c0d1e2
        title:
          type: string
          example: BSc Computer Science
        university:
          type: string
          example: University of Eastminster
        degreeUrl:
          type: string
          format: uri
          description: URL to the official university degree page.
          example: https://www.eastminster.ac.uk/degrees/bsc-cs
        completionDate:
          type: string
          format: date
          example: "2018-07-15"

    DegreeRequest:
      type: object
      required: [title, university, degreeUrl, completionDate]
      properties:
        title:
          type: string
          example: BSc Computer Science
        university:
          type: string
          example: University of Eastminster
        degreeUrl:
          type: string
          format: uri
          description: URL to the official university degree page.
          example: https://www.eastminster.ac.uk/degrees/bsc-cs
        completionDate:
          type: string
          format: date
          example: "2018-07-15"

    Certification:
      type: object
      required: [title, issuingOrganisation, certificationUrl, completionDate]
      properties:
        id:
          type: string
          example: c1a2b3c4d5e6f7a8b9c0d1e2
        title:
          type: string
          example: AWS Solutions Architect Associate
        issuingOrganisation:
          type: string
          example: Amazon Web Services
        certificationUrl:
          type: string
          format: uri
          description: URL to the certification/course page.
          example: https://aws.amazon.com/certification/solutions-architect-associate
        completionDate:
          type: string
          format: date
          example: "2021-03-20"

    CertificationRequest:
      type: object
      required: [title, issuingOrganisation, certificationUrl, completionDate]
      properties:
        title:
          type: string
          example: AWS Solutions Architect Associate
        issuingOrganisation:
          type: string
          example: Amazon Web Services
        certificationUrl:
          type: string
          format: uri
          description: URL to the certification/course page.
          example: https://aws.amazon.com/certification/solutions-architect-associate
        completionDate:
          type: string
          format: date
          example: "2021-03-20"

    Licence:
      type: object
      required: [title, awardingBody, licenceUrl, completionDate]
      properties:
        id:
          type: string
          example: l1a2b3c4d5e6f7a8b9c0d1e2
        title:
          type: string
          example: Chartered Engineer (CEng)
        awardingBody:
          type: string
          example: Engineering Council UK
        licenceUrl:
          type: string
          format: uri
          description: URL to the licence awarding body.
          example: https://www.engc.org.uk/ceng
        completionDate:
          type: string
          format: date
          example: "2020-09-01"

    LicenceRequest:
      type: object
      required: [title, awardingBody, licenceUrl, completionDate]
      properties:
        title:
          type: string
          example: Chartered Engineer (CEng)
        awardingBody:
          type: string
          example: Engineering Council UK
        licenceUrl:
          type: string
          format: uri
          description: URL to the licence awarding body.
          example: https://www.engc.org.uk/ceng
        completionDate:
          type: string
          format: date
          example: "2020-09-01"

    Course:
      type: object
      required: [title, provider, courseUrl, completionDate]
      properties:
        id:
          type: string
          example: cr1a2b3c4d5e6f7a8b9c0d1e2
        title:
          type: string
          example: Machine Learning Specialisation
        provider:
          type: string
          example: Coursera / Stanford
        courseUrl:
          type: string
          format: uri
          description: URL to the course page.
          example: https://www.coursera.org/specializations/machine-learning
        completionDate:
          type: string
          format: date
          example: "2022-01-10"

    CourseRequest:
      type: object
      required: [title, provider, courseUrl, completionDate]
      properties:
        title:
          type: string
          example: Machine Learning Specialisation
        provider:
          type: string
          example: Coursera / Stanford
        courseUrl:
          type: string
          format: uri
          description: URL to the course page.
          example: https://www.coursera.org/specializations/machine-learning
        completionDate:
          type: string
          format: date
          example: "2022-01-10"

    Employment:
      type: object
      required: [jobTitle, company, startDate]
      properties:
        employmentId:
          type: string
          example: e1a2b3c4d5e6f7a8b9c0d1e2
        jobTitle:
          type: string
          example: Senior Software Engineer
        company:
          type: string
          example: Google
        startDate:
          type: string
          format: date
          example: "2019-06-01"
        endDate:
          type: string
          format: date
          nullable: true
          description: Null if currently employed.
          example: null

    EmploymentRequest:
      type: object
      required: [jobTitle, company, startDate]
      properties:
        jobTitle:
          type: string
          example: Senior Software Engineer
        company:
          type: string
          example: Google
        startDate:
          type: string
          format: date
          example: "2019-06-01"
        endDate:
          type: string
          format: date
          nullable: true
          description: Null if currently employed.
          example: null

    # ─── Bidding ──────────────────────────
    BidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          description: |
            Bid amount in GBP (£). Must be greater than the alumni's previous bid if updating.
            This amount is funded from the alumni's accepted sponsorship pool.
            The bid amount cannot exceed the total available sponsorship funds.
            If the alumni wins, they pocket this bid amount.
          example: 250.00

    BidResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Bid placed successfully.
        data:
          type: object
          properties:
            bidId:
              type: string
              example: b1a2b3c4d5e6f7a8b9c0d1e2
            amount:
              type: number
              format: double
              example: 250.00
            status:
              type: string
              enum: [winning, losing]
              description: Indicates whether the alumni is currently the highest bidder. Does NOT reveal the actual highest bid amount.
              example: winning
            bidDate:
              type: string
              format: date
              description: The date for which this bid applies (the following day after midnight selection).
              example: "2026-02-20"
            createdAt:
              type: string
              format: date-time

    BidStatus:
      type: object
      properties:
        bidId:
          type: string
          example: b1a2b3c4d5e6f7a8b9c0d1e2
        amount:
          type: number
          format: double
          example: 250.00
        status:
          type: string
          enum: [winning, losing, won, lost, pending]
          example: winning
        bidDate:
          type: string
          format: date
          example: "2026-02-20"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MonthlyBidSummary:
      type: object
      properties:
        month:
          type: string
          example: "2026-02"
        winsThisMonth:
          type: integer
          example: 2
        maxWinsAllowed:
          type: integer
          description: 3 by default, 4 if the alumni attended a university event this month.
          example: 3
        remainingSlots:
          type: integer
          example: 1
        attendedEventThisMonth:
          type: boolean
          example: false
        bids:
          type: array
          items:
            $ref: '#/components/schemas/BidStatus'

    WinnerResult:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The featured date.
          example: "2026-02-20"
        winnerId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        winningBidAmount:
          type: number
          format: double
          example: 250.00
        payout:
          $ref: '#/components/schemas/SponsorshipPayout'
        selectedAt:
          type: string
          format: date-time

    # ─── Featured Alumni (Public) ─────────
    FeaturedAlumni:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-02-20"
        alumni:
          type: object
          properties:
            firstName:
              type: string
              example: Jane
            lastName:
              type: string
              example: Doe
            biography:
              type: string
              example: Software engineer with 10 years of experience in EdTech.
            linkedinUrl:
              type: string
              format: uri
              example: https://www.linkedin.com/in/janedoe
            profileImageUrl:
              type: string
              format: uri
              example: /uploads/profiles/665a1b2c3d4e5f6a7b8c9d0e.jpg
            degrees:
              type: array
              items:
                $ref: '#/components/schemas/Degree'
            certifications:
              type: array
              items:
                $ref: '#/components/schemas/Certification'
            licences:
              type: array
              items:
                $ref: '#/components/schemas/Licence'
            courses:
              type: array
              items:
                $ref: '#/components/schemas/Course'
            employmentHistory:
              type: array
              items:
                $ref: '#/components/schemas/Employment'

    # ─── API Client ───────────────────────
    ApiClientScope:
      type: string
      enum:
        - public:featured:read
        - public:history:read
        - public:profile:read

    ApiClientRegisterRequest:
      type: object
      required: [clientName, description, contactEmail]
      properties:
        clientName:
          type: string
          example: AR Campus App
        description:
          type: string
          example: Augmented reality mobile application for campus tours.
        contactEmail:
          type: string
          format: email
          example: dev@arcampus.io
        scopes:
          type: array
          description: Optional token scopes for the initial token. Defaults to all public read scopes.
          items:
            $ref: '#/components/schemas/ApiClientScope'

    ApiClientRegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: API client registered successfully. Store your token securely; it will not be shown again.
        data:
          type: object
          properties:
            client_id:
              type: string
              example: cli_a1b2c3d4e5f6
            client_name:
              type: string
              example: AR Campus App
            description:
              type: string
              example: Augmented reality mobile application for campus tours.
            contact_email:
              type: string
              format: email
              example: dev@arcampus.io
            is_revoked:
              type: boolean
              example: false
            created_by_user_id:
              type: string
              example: usr_a1b2c3d4
            created_at:
              type: string
              format: date-time
            token:
              type: string
              description: Bearer token for API access. Shown once; store securely.
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            scopes:
              type: array
              items:
                $ref: '#/components/schemas/ApiClientScope'

    ApiClientUsageStats:
      type: object
      properties:
        client_id:
          type: string
          example: cli_a1b2c3d4e5f6
        client_name:
          type: string
          example: AR Campus App
        description:
          type: string
          example: Augmented reality mobile application for campus tours.
        contact_email:
          type: string
          format: email
          example: dev@arcampus.io
        is_revoked:
          type: boolean
          example: false
        created_by_user_id:
          type: string
          example: usr_a1b2c3d4
        created_at:
          type: string
          format: date-time
        total_request_count:
          type: integer
          example: 1542
        last_accessed_at:
          type: string
          format: date-time
          nullable: true
        tokens:
          type: array
          items:
            type: object
            properties:
              token_id:
                type: string
              client_id:
                type: string
              scopes:
                type: array
                items:
                  $ref: '#/components/schemas/ApiClientScope'
              issued_at:
                type: string
                format: date-time
              expires_at:
                type: string
                format: date-time
                nullable: true
              revoked_at:
                type: string
                format: date-time
                nullable: true
        endpoint_usage:
          type: array
          items:
            type: object
            properties:
              usage_id:
                type: string
              token_id:
                type: string
              endpoint:
                type: string
                example: /api/v1/public/featured
              http_method:
                type: string
                example: GET
              usage_date:
                type: string
                format: date-time
              request_count:
                type: integer
                example: 5
              last_accessed_at:
                type: string
                format: date-time
        latest_token:
          type: object
          nullable: true
          properties:
            token_id:
              type: string
            client_id:
              type: string
            scopes:
              type: array
              items:
                $ref: '#/components/schemas/ApiClientScope'
            issued_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
              nullable: true
            revoked_at:
              type: string
              format: date-time
              nullable: true

    # ─── Sponsorship ──────────────────────
    SponsorOrganization:
      type: object
      properties:
        sponsorOrgId:
          type: string
          example: so1a2b3c4d5e6f7a8b9c0d1e2
        sponsorName:
          type: string
          example: Amazon Web Services
        sponsorEmail:
          type: string
          format: email
          example: partnerships@aws.amazon.com
        createdAt:
          type: string
          format: date-time

    SponsorOrganizationCreateRequest:
      type: object
      required: [sponsorName, sponsorEmail]
      properties:
        sponsorName:
          type: string
          example: Amazon Web Services
        sponsorEmail:
          type: string
          format: email
          example: partnerships@aws.amazon.com

    SponsorOrganizationUpdateRequest:
      type: object
      properties:
        sponsorName:
          type: string
          example: Amazon Web Services
        sponsorEmail:
          type: string
          format: email
          example: partnerships@aws.amazon.com

    SponsorOrganizationAssignment:
      type: object
      properties:
        userId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        sponsorOrgId:
          type: string
          example: so1a2b3c4d5e6f7a8b9c0d1e2
        sponsorName:
          type: string
          example: Amazon Web Services
        sponsorEmail:
          type: string
          format: email
          example: partnerships@aws.amazon.com

    SponsorshipOffer:
      type: object
      properties:
        id:
          type: string
          example: sp1a2b3c4d5e6f7a8b9c0d1e2
        sponsorName:
          type: string
          description: Name of the sponsoring organisation (course provider, licensing body, or certification org).
          example: Amazon Web Services
        sponsorEmail:
          type: string
          format: email
          example: partnerships@aws.amazon.com
        credentialType:
          type: string
          enum: [certification, licence, course]
          description: The type of credential being sponsored.
          example: certification
        credentialId:
          type: string
          description: The ID of the alumni's credential (certification, licence, or course) being sponsored.
          example: c1a2b3c4d5e6f7a8b9c0d1e2
        credentialTitle:
          type: string
          description: Human-readable title of the credential.
          example: AWS Solutions Architect Associate
        amountOffered:
          type: number
          format: double
          description: Amount (£) the sponsor is offering the alumni to endorse/promote this credential.
          example: 300.00
        status:
          type: string
          enum: [pending, accepted, declined, expired, paid, cancelled]
          description: |
            - **pending**: Offer sent, awaiting alumni response.
            - **accepted**: Alumni accepted; funds available for bidding.
            - **declined**: Alumni declined the offer.
            - **expired**: Offer expired before alumni responded.
            - **paid**: Sponsor payment processed after a winning bid displayed the profile.
            - **cancelled**: Sponsor withdrew the offer.
          example: accepted
        message:
          type: string
          description: Optional message from the sponsor to the alumni.
          example: We'd love for you to showcase your AWS certification on the platform!
        expiresAt:
          type: string
          format: date-time
          description: When the offer expires if not accepted.
          example: "2026-03-01T23:59:59.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SponsorshipOfferRequest:
      type: object
      required: [credentialType, credentialId, amountOffered]
      properties:
        credentialType:
          type: string
          enum: [certification, licence, course]
          example: certification
        credentialId:
          type: string
          description: The ID of the specific credential on the alumni's profile.
          example: c1a2b3c4d5e6f7a8b9c0d1e2
        amountOffered:
          type: number
          format: double
          minimum: 1.00
          description: Amount (£) being offered to the alumni.
          example: 300.00
        message:
          type: string
          description: Optional message to the alumni.
          example: We'd love for you to showcase your AWS certification on the platform!
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 7
          description: Number of days before the offer expires.
          example: 7

    SponsorableAlumniCredential:
      type: object
      properties:
        alumniId:
          type: string
        alumniEmail:
          type: string
          format: email
        alumniFirstName:
          type: string
        alumniLastName:
          type: string
        credentialId:
          type: string
        credentialType:
          type: string
          enum: [certification, licence, course]
        credentialTitle:
          type: string
        providerName:
          type: string
        credentialUrl:
          type: string
        completionDate:
          type: string
          format: date-time
        hasActiveOfferFromMyOrg:
          type: boolean

    SponsorshipRespondRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, decline]
          description: Whether the alumni accepts or declines the sponsorship offer.
          example: accept

    SponsorshipSummary:
      type: object
      description: Summary of an alumni's sponsorship funds available for bidding.
      properties:
        alumniId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        totalOffered:
          type: number
          format: double
          description: Total amount (£) offered across all accepted sponsorships.
          example: 500.00
        totalUsedInBids:
          type: number
          format: double
          description: Total amount (£) committed in active bids (pending, winning, losing).
          example: 250.00
        availableForBidding:
          type: number
          format: double
          description: Remaining sponsorship funds (£) available to place bids.
          example: 250.00
        acceptedOffers:
          type: array
          items:
            $ref: '#/components/schemas/SponsorshipOffer'

    SponsorshipPayout:
      type: object
      description: |
        Payout record created when an alumni wins "Alumni of the Day".
        The sponsor only pays if the alumni wins and their profile is displayed.
        The organization records the winning bid amount as profit, and the alumni pockets
        the remaining sponsorship surplus after the winning bid is covered.
      properties:
        payoutId:
          type: string
          example: po1a2b3c4d5e6f7a8b9c0d1e2
        alumniId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        featuredDate:
          type: string
          format: date
          example: "2026-02-20"
        winningBidAmount:
          type: number
          format: double
          description: The bid amount the alumni placed and won with. This is the organization's profit.
          example: 250.00
        sponsorshipBreakdown:
          type: array
          description: How the winning bid is funded from the accepted sponsorships.
          items:
            type: object
            properties:
              sponsorshipOfferId:
                type: string
                example: sp1a2b3c4d5e6f7a8b9c0d1e2
              sponsorName:
                type: string
                example: Amazon Web Services
              credentialTitle:
                type: string
                example: AWS Solutions Architect Associate
              amountCharged:
                type: number
                format: double
                description: The full accepted offer amount (£) charged to this sponsor after a win.
                example: 150.00
        alumniPayout:
          type: number
          format: double
          description: Total amount (£) the alumni pockets after the winning bid is covered.
          example: 125.00
        status:
          type: string
          enum: [pending, processed, failed]
          example: processed
        createdAt:
          type: string
          format: date-time

    OrgProfitSummary:
      type: object
      description: Aggregated sponsorship profit summary for the organization.
      properties:
        payoutCount:
          type: integer
          example: 12
        totalSponsorshipCharged:
          type: number
          format: double
          example: 5400.00
        totalWinningBidAmount:
          type: number
          format: double
          example: 2750.00
        totalAlumniPayout:
          type: number
          format: double
          example: 2650.00
        orgProfit:
          type: number
          format: double
          description: totalWinningBidAmount
          example: 2750.00
        formula:
          type: string
          example: orgProfit = totalWinningBidAmount; alumniProfit = totalSponsorshipCharged - totalWinningBidAmount

    # ─── Event Attendance ─────────────────
    EventAttendanceRequest:
      type: object
      required: [alumniId, eventName, eventDate]
      properties:
        alumniId:
          type: string
          example: 665a1b2c3d4e5f6a7b8c9d0e
        eventName:
          type: string
          example: Eastminster Spring Alumni Networking 2026
        eventDate:
          type: string
          format: date
          example: "2026-02-15"

    # ─── Generic Success ──────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        currentPage:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 5
        totalItems:
          type: integer
          example: 47
        itemsPerPage:
          type: integer
          example: 10

  # ──────────────────────────────────────────
  # Reusable Responses
  # ──────────────────────────────────────────
  responses:
    BadRequest:
      description: Bad request – validation error or malformed input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: Validation failed.
            errors:
              - field: email
                message: Must be a valid @eastminster.ac.uk email address.

    Unauthorized:
      description: Unauthorized – missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: Authentication required. Please log in.

    Forbidden:
      description: Forbidden – insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: You do not have permission to access this resource.

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: Resource not found.

    Conflict:
      description: Conflict – duplicate resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: An account with this email already exists.

    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: Too many requests. Please try again later.

    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: An unexpected error occurred. Please try again later.

# ════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════
paths:

  # ──────────────────────────────────────────
  # AUTHENTICATION
  # ──────────────────────────────────────────
  /auth/users:
    post:
      tags: [Authentication]
      summary: Register a new alumni account
      security:
        - CsrfCookie: []
          CsrfHeader: []
      description: |
        Creates a new alumni account. The email **must** belong to the university domain
        (`@eastminster.ac.uk`). A verification email with a secure token is sent upon
        successful registration. The alumni cannot log in until the email is verified.
        This is a mutating endpoint and requires CSRF (`csrf_token` cookie + `X-CSRF-Token` header).

        **Password requirements:**
        - Minimum 8 characters
        - At least one uppercase letter
        - At least one lowercase letter
        - At least one digit
        - At least one special character

        Passwords are hashed using **bcrypt** with an appropriate number of salt rounds before storage.
      operationId: registerAlumni
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful. Verification email sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/csrf-token:
    get:
      tags: [Authentication]
      summary: Issue a CSRF token for subsequent mutating requests
      security: []
      description: |
        Issues a CSRF token for clients (e.g. Postman, Swagger UI setup) before calling mutating endpoints.
        Most safe routes also set a `csrf_token` cookie automatically when one is missing.
        Returns the token in response body and sets the `csrf_token` cookie.
      operationId: createCsrfToken
      responses:
        '200':
          description: CSRF token issued.
          headers:
            Set-Cookie:
              description: Sets `csrf_token` cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: CSRF token issued.
                  data:
                    type: object
                    properties:
                      csrfToken:
                        type: string
                        example: 6f79e5f0f1cc4a42a13fd58fdf7d98f95ca22a6d4a6428a5795e22692e85d07f
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify-email/{token}:
    get:
      tags: [Authentication]
      summary: Verify alumni email address
      security: []
      description: |
        Verifies the alumni's email address using the token sent during registration.
        The token is **cryptographically random**, **single-use**, and has a configurable
        **expiry time** (default: 24 hours). Once verified, the alumni can log in.
      operationId: verifyEmail
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Email verification token from the verification email.
          example: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
      responses:
        '200':
          description: Email verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Email verified successfully. You can now log in.
        '400':
          description: Invalid or expired verification token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: Invalid or expired verification token. Please request a new one.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Request a new email verification token
      security:
        - CsrfCookie: []
          CsrfHeader: []
      description: |
        Creates a new verification token and sends the verification email. The previous token is invalidated.
        This is a mutating endpoint and requires CSRF (`csrf_token` cookie + `X-CSRF-Token` header).
      operationId: createEmailVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEmailVerificationRequest'
      responses:
        '201':
          description: Verification token created and email sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Verification email has been sent. Please check your inbox.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/sessions:
    post:
      tags: [Authentication]
      summary: Create a new authentication session
      security: []
      description: |
        Authenticates the alumni and creates a cookie-based session.
        On success, the server sets:
        - `access_token` (HttpOnly) for authentication
        - `csrf_token` (readable cookie) for CSRF protection

        Login is blocked if the email has not been verified.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Session created. Authentication and CSRF cookies are set.
          headers:
            Set-Cookie:
              description: Sets `access_token` and `csrf_token` cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials or email not verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: Invalid email or password.
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Authentication]
      summary: Destroy the current authentication session
      description: Invalidates the current session and clears `access_token` and `csrf_token` cookies.
      operationId: deleteSession
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      responses:
        '204':
          description: Session destroyed successfully. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/sessions/summary:
    get:
      tags: [Authentication]
      summary: Get current user's session summary
      description: Returns the current user's active session count and last login time.
      operationId: getSessionSummary
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Session summary returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/password-resets:
    post:
      tags: [Authentication]
      summary: Create a password reset request
      security:
        - CsrfCookie: []
          CsrfHeader: []
      description: |
        Creates a password reset resource and sends an email with a **cryptographically random, single-use** token.
        The token expires after a configurable period (default: 1 hour).
        For security, a success response is returned regardless of whether the email exists.
      operationId: createPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '201':
          description: Password reset resource created (email sent if account exists).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: If an account with that email exists, a password reset token has been sent.
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Authentication]
      summary: Complete a password reset
      security:
        - CsrfCookie: []
          CsrfHeader: []
      description: |
        Completes a password reset using the secure token from the password reset email.
        The token is validated for authenticity, expiry, and single-use.
        The new password must meet the same strength requirements as registration.
        All existing JWT tokens for the user are invalidated (blacklisted) after a successful reset.
      operationId: completePasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Password has been reset successfully. Please log in with your new password.
        '400':
          description: Invalid or expired reset token, or password does not meet requirements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────
  # PROFILE MANAGEMENT
  # ──────────────────────────────────────────
  /profile:
    get:
      tags: [Profile]
      summary: Get current alumni's full profile
      description: Retrieves the authenticated alumni's complete profile including all degrees, certifications, licences, courses, and employment history.
      operationId: getMyProfile
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Profile retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Profile]
      summary: Update personal information
      description: Updates the alumni's basic profile information (name, biography, LinkedIn URL).
      operationId: updateProfile
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profile updated successfully.
                  data:
                    $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Profile]
      summary: Clear personal profile fields
      description: Clears the alumni's profile fields (biography, LinkedIn URL, and profile image URL).
      operationId: clearProfile
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      responses:
        '204':
          description: Profile fields cleared. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /profile/image:
    put:
      tags: [Profile]
      summary: Upload or replace profile image
      description: |
        Creates or replaces the alumni's profile image.
        Accepted formats: JPEG, PNG, WebP. Maximum file size: 5 MB.
        Images are stored securely and served via a static URL.
      operationId: replaceProfileImage
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Profile image file (JPEG, PNG, or WebP; max 5 MB).
      responses:
        '200':
          description: Profile image uploaded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profile image uploaded successfully.
                  data:
                    type: object
                    properties:
                      profileImageUrl:
                        type: string
                        format: uri
                        example: /uploads/profiles/665a1b2c3d4e5f6a7b8c9d0e.jpg
        '400':
          description: Invalid file type or size exceeds limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Profile]
      summary: Delete profile image
      description: Removes the alumni's current profile image.
      operationId: deleteProfileImage
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      responses:
        '204':
          description: Profile image deleted. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Degrees ────────────────────────────
  /profile/degrees:
    get:
      tags: [Profile]
      summary: List all degrees
      description: Returns all degrees for the authenticated alumni.
      operationId: listDegrees
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Degrees retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Degree'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Profile]
      summary: Add a degree
      description: Adds a new degree to the alumni's profile. The URL is validated to ensure it is a well-formed URI.
      operationId: addDegree
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DegreeRequest'
      responses:
        '201':
          description: Degree added successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Degree added successfully.
                  data:
                    $ref: '#/components/schemas/Degree'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /profile/degrees/{degreeId}:
    put:
      tags: [Profile]
      summary: Update a degree
