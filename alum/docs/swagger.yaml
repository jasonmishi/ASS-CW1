  # ──────────────────────────────────────────
  # BLIND BIDDING SYSTEM
  # ──────────────────────────────────────────
  /bids:
    post:
      tags: [Bidding]
      summary: Place a new bid
      description: |
        Places a blind bid for the next available "Alumni of the Day" slot.

        **Blind Bidding Rules:**
        - The alumni **cannot** see the current highest bid amount.
        - After placing a bid, the alumni receives only a **winning/losing** status.
        - Bids can only be **increased** (not decreased or withdrawn).
        - Each alumnus can win a maximum of **3 times per calendar month** (4 if they attended a university event that month).
        - The winner is automatically selected daily at **midnight**.

        **Sponsorship-Funded Bidding:**
        - Bids are funded from the alumni's pool of **accepted sponsorship offers**.
        - The bid amount **cannot exceed** the alumni's total available sponsorship funds.
        - Example: If an alumni has accepted sponsorships of £200 (from Coursera) and £300 (from AWS),
          they have £500 available. They may bid £250. If they win, they pocket the £250.
        - Sponsors are only charged if the alumni **wins** and their profile is displayed.
        - After a win, each accepted sponsor is charged their full accepted offer amount.
      operationId: placeBid
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '201':
          description: Bid placed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          description: |
            Validation error. Possible reasons:
            - Amount must be a positive number.
            - Amount must be greater than your current bid (increase only).
            - You have already reached the monthly win limit.
            - Bidding is currently closed (after midnight cutoff).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Forbidden. Possible reasons:
            - Monthly win limit reached (3 wins, or 4 with event attendance).
            - Insufficient sponsorship funds to cover the bid amount.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                monthlyLimit:
                  summary: Monthly limit reached
                  value:
                    success: false
                    message: You have reached the maximum number of wins (3) for this month. Attend a university event to unlock 1 additional slot.
                insufficientFunds:
                  summary: Insufficient sponsorship funds
                  value:
                    success: false
                    message: "Insufficient sponsorship funds. Your available balance is £200.00 but you attempted to bid £300.00."
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Bidding]
      summary: Get all my bids
      description: |
        Returns all bids placed by the authenticated alumni.
        Each bid includes its **winning/losing** status (but never the actual highest bid).
      operationId: getMyBids
      security:
        - SessionCookieAuth: []
      parameters:
        - name: month
          in: query
          description: Filter by month (YYYY-MM format).
          schema:
            type: string
            example: "2026-02"
      responses:
        '200':
          description: Bids retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BidStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bids/{bidId}:
    get:
      tags: [Bidding]
      summary: Get a specific bid's details
      description: Returns the details of a specific bid including its current status (winning/losing/won/lost).
      operationId: getBidById
      security:
        - SessionCookieAuth: []
      parameters:
        - name: bidId
          in: path
          required: true
          schema:
            type: string
      responses:
