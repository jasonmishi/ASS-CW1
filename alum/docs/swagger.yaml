                    $ref: '#/components/schemas/SponsorshipOffer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Sponsorship]
      summary: Cancel a pending sponsorship offer
      description: |
        Deletes (cancels) a pending sponsorship offer.
        Accepted offers cannot be cancelled.
        Only offers in `pending` status can be deleted.
      operationId: deleteSponsorshipOffer
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Sponsorship offer deleted. No content returned.
        '400':
          description: Offer cannot be deleted because it is not in pending status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: Only pending offers can be cancelled.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sponsorships/offers/{offerId}/response:
    put:
      tags: [Sponsorship]
      summary: Accept or decline a sponsorship offer
      description: |
        The alumni sets their response to a sponsorship offer for one of their credentials.

        - **Accept**: The offered amount is added to the alumni's available bidding pool.
        - **Decline**: The offer is marked as declined and no funds are added.

        Only offers in `pending` status can be responded to.
      operationId: setOfferResponse
      security:
        - SessionCookieAuth: []
          CsrfCookie: []
          CsrfHeader: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SponsorshipRespondRequest'
      responses:
        '200':
          description: Response recorded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sponsorship offer accepted. £300.00 added to your bidding pool.
                  data:
                    $ref: '#/components/schemas/SponsorshipOffer'
        '400':
          description: Offer is not in pending status or has expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: This offer has already expired and can no longer be accepted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

