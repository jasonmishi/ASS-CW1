      summary: Create a new API client
      description: |
        Creates a new API client resource (e.g. AR app, third-party integration) and returns
        a **Bearer token** for accessing public API endpoints. The token is shown **once**
        and must be stored securely by the client.

        This endpoint is restricted to administrators.
      operationId: createApiClient
      security:
        - SessionCookieAuth: []
