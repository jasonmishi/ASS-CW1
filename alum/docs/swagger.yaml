        '500':
          $ref: '#/components/responses/InternalServerError'

  /bids/current:
    get:
      tags: [Bidding]
      summary: Get current active bid
      description: |
        Returns the alumni's bid for the **current active bidding window**.
        Indicates whether they are currently **winning** or **losing** without revealing the highest bid amount.
      operationId: getCurrentBid
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Current bid status retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      hasBid:
                        type: boolean
                        example: true
                      status:
                        type: string
                        enum: [winning, losing, no_bid]
                        example: winning
                      currentBidAmount:
                        type: number
                        format: double
                        description: The alumni's own current bid amount.
                        example: 250.00
                      bidId:
                        type: string
                        example: b1a2b3c4d5e6f7a8b9c0d1e2
                      biddingClosesAt:
                        type: string
                        format: date-time
                        description: When the current bidding window closes (midnight today).
                        example: "2026-02-20T00:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

