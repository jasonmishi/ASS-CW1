services:
  db_test:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alum_test
    ports:
      - "${TEST_DB_PORT:-55433}:5432"
    volumes:
      - alum_test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alum_test"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  alum_test_db_data:
