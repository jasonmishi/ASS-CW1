services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alum
    ports:
      - "5432:5432"
    volumes:
      - alum_db_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    command: sh -c "npm run migrate:deploy && npm run dev"
    volumes:
      - ./:/app
      - alum_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/alum
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@eastminster.local
      APP_BASE_URL: http://localhost:3000
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: profile-images
      MINIO_PUBLIC_URL: http://localhost:9000
      ANALYTICS_DASHBOARD_API_TOKEN: "edc4c0f1554f20cbb23af2711e64923ab2c1768ed29f1c46c00dafa12785a792f76d295fc722d635"
      ANALYTICS_ALUMNI_DIRECTORY_API_TOKEN: edc4c0f1554f20cbb23af2711e64923ab2c1768ed29f1c46c00dafa12785a792f76d295fc722d635
    depends_on:
      - db
      - mailhog
      - minio
      - minio-init

  worker:
    build:
      context: .
    command: npm run worker
    volumes:
      - ./:/app
      - alum_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/alum
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@eastminster.local
      APP_BASE_URL: http://localhost:3000
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: profile-images
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      - db
      - mailhog
      - minio
      - minio-init

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - alum_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/profile-images &&
      /usr/bin/mc anonymous set download local/profile-images
      "

volumes:
  alum_db_data:
  alum_minio_data:
  alum_node_modules:
