x-shared-env: &shared-env
  NODE_ENV: development
  PORT: 3000
  DATABASE_URL: postgres://postgres:postgres@db:5432/alum
  JWT_SECRET: change-me-jwt-secret
  JWT_EXPIRES_IN: 1h
  ACCESS_TOKEN_COOKIE_NAME: access_token
  ACCESS_TOKEN_COOKIE_SAMESITE: lax
  CSRF_SECRET: change-me-csrf-secret
  CSRF_COOKIE_NAME: csrf_token
  CSRF_COOKIE_SAMESITE: lax
  ALLOWED_ORIGINS: http://localhost:3001
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_TRUST_PROXY: "true"
  BCRYPT_SALT_ROUNDS: "12"
  EMAIL_VERIFICATION_TTL_HOURS: "24"
  PASSWORD_RESET_TTL_HOURS: "1"
  EMAIL_TRANSPORT: smtp
  SMTP_HOST: mailhog
  SMTP_PORT: "1025"
  SMTP_SECURE: "false"
  EMAIL_FROM: noreply@eastminster.local
  APP_BASE_URL: http://localhost:3001
  STORAGE_PROVIDER: minio
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: profile-images
  MINIO_PUBLIC_URL: http://localhost:9000
  BOOTSTRAP_ADMIN_EMAIL: admin@eastminster.ac.uk
  BOOTSTRAP_ADMIN_USERNAME: admin@eastminster.ac.uk
  BOOTSTRAP_ADMIN_PASSWORD: ChangeMe!123!
  SCHEDULER_SYSTEM_EMAIL: system.scheduler@eastminster.local
  SCHEDULER_TICK_MS: "30000"
  SPONSORSHIP_EXPIRY_INTERVAL_MS: "300000"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alum
    ports:
      - "5432:5432"
    volumes:
      - alum_db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    working_dir: /app/api
    command: sh -c "npm run migrate:deploy && npm run dev"
    volumes:
      - ./:/app
      - alum_api_node_modules:/app/api/node_modules
    environment:
      <<: *shared-env
    depends_on:
      - db
      - mailhog
      - minio
      - minio-init
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    working_dir: /app/web
    command: npm run dev
    volumes:
      - ./:/app
      - alum_web_node_modules:/app/web/node_modules
    environment:
      <<: *shared-env
      INTERNAL_API_BASE_URL: http://api:3000
      PUBLIC_API_BASE_URL: http://localhost:3000
      ANALYTICS_DASHBOARD_API_TOKEN: "edc4c0f1554f20cbb23af2711e64923ab2c1768ed29f1c46c00dafa12785a792f76d295fc722d635"
      ANALYTICS_ALUMNI_DIRECTORY_API_TOKEN: "edc4c0f1554f20cbb23af2711e64923ab2c1768ed29f1c46c00dafa12785a792f76d295fc722d635"
    depends_on:
      - db
      - api
    ports:
      - "3001:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    working_dir: /app/api
    command: npm run worker
    volumes:
      - ./:/app
      - alum_worker_node_modules:/app/api/node_modules
    environment:
      <<: *shared-env
    depends_on:
      - db
      - mailhog
      - minio
      - minio-init

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - alum_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/profile-images &&
      /usr/bin/mc anonymous set download local/profile-images
      "

volumes:
  alum_db_data:
  alum_minio_data:
  alum_api_node_modules:
  alum_web_node_modules:
  alum_worker_node_modules:
