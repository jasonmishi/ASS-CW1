x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  environment:
    NODE_ENV: production
    PORT: 3000
    DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-alum}
    JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
    JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    ACCESS_TOKEN_COOKIE_NAME: ${ACCESS_TOKEN_COOKIE_NAME:-access_token}
    ACCESS_TOKEN_COOKIE_SAMESITE: ${ACCESS_TOKEN_COOKIE_SAMESITE:-lax}
    CSRF_SECRET: ${CSRF_SECRET:-change-me-csrf-secret}
    CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-csrf_token}
    CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-lax}
    ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
    RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
    RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-true}
    BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
    EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
    PASSWORD_RESET_TTL_HOURS: ${PASSWORD_RESET_TTL_HOURS:-1}
    EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-log}
    SMTP_HOST: ${SMTP_HOST:-localhost}
    SMTP_PORT: ${SMTP_PORT:-1025}
    SMTP_SECURE: ${SMTP_SECURE:-false}
    EMAIL_FROM: ${EMAIL_FROM:-noreply@eastminster.local}
    APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
    MINIO_PORT: ${MINIO_PORT:-9000}
    MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET: ${MINIO_BUCKET:-profile-images}
    MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@eastminster.ac.uk}
    BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin@eastminster.ac.uk}
    BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe!123!}
    SCHEDULER_SYSTEM_EMAIL: ${SCHEDULER_SYSTEM_EMAIL:-system.scheduler@eastminster.local}
    SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-30000}
    SPONSORSHIP_EXPIRY_INTERVAL_MS: ${SPONSORSHIP_EXPIRY_INTERVAL_MS:-300000}
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "migrate:deploy"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-alum}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ACCESS_TOKEN_COOKIE_NAME: ${ACCESS_TOKEN_COOKIE_NAME:-access_token}
      ACCESS_TOKEN_COOKIE_SAMESITE: ${ACCESS_TOKEN_COOKIE_SAMESITE:-lax}
      CSRF_SECRET: ${CSRF_SECRET:-change-me-csrf-secret}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-csrf_token}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-lax}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-true}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
      PASSWORD_RESET_TTL_HOURS: ${PASSWORD_RESET_TTL_HOURS:-1}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-log}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@eastminster.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-profile-images}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@eastminster.ac.uk}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin@eastminster.ac.uk}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe!123!}
      SCHEDULER_SYSTEM_EMAIL: ${SCHEDULER_SYSTEM_EMAIL:-system.scheduler@eastminster.local}
      SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-30000}
      SPONSORSHIP_EXPIRY_INTERVAL_MS: ${SPONSORSHIP_EXPIRY_INTERVAL_MS:-300000}
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
      app-3:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro

  app-1:
    <<: *app-common
    command: ["node", "app.js"]

  app-2:
    <<: *app-common
    command: ["node", "app.js"]

  app-3:
    <<: *app-common
    command: ["node", "app.js"]

  worker:
    <<: *app-common
    command: ["node", "workers/scheduler.js"]
    healthcheck:
      disable: true

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - alum_prod_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-profile-images} &&
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-profile-images}
      "

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-alum}
    volumes:
      - alum_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-alum}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  alum_prod_db_data:
  alum_prod_minio_data:
